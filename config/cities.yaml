# City registry for Open-Meteo forecast lookups.
#
# slug — matches Polymarket city_slug (data/snapshots/events/{slug}_{date}_{high|low}.json)
# icao  — METAR / station id (optional, for observations later)
# lat/lon — coordinates passed to Open-Meteo
# tz    — IANA timezone for daily aggregation (local calendar day)
# unit  — Open-Meteo temperature_unit + display (US cities: F, others: C)
# fallback_models — used when primary model returns empty data (e.g. kma_seamless suspended)
# models — deterministic Open-Meteo model id (https://open-meteo.com/en/docs)
# daily — Open-Meteo daily variables (max/min for high/low temperature markets)
# ensemble_models — list of Open-Meteo ensemble model ids (https://open-meteo.com/en/docs/ensemble-api)
#
# Fetched via connectors.forecast.OpenMeteoClient (one deterministic model per city, no auto blend).

cities:
  - slug: phoenix
    name: Phoenix
    icao: KPHX
    lat: 33.4484
    lon: -112.0740
    tz: America/Phoenix
    unit: F

    daily:
